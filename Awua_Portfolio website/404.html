<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Page Not Found | Engr. Dr. J. T. Awua</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0b1c3c;
      --accent: #f97316;
      --white: #ffffff;
      --text: #1e293b;
      --bg-alt: #f1f5f9;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--primary);
      color: var(--white);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      position: relative;
    }

    .background-shapes {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: 0;
      overflow: hidden;
    }

    .shape {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(249,115,22,0.15), transparent 70%);
      filter: blur(40px);
    }

    .shape-1 { width: 500px; height: 500px; top: -200px; right: -100px; }
    .shape-2 { width: 400px; height: 400px; bottom: -100px; left: -100px; background: radial-gradient(circle, rgba(30,58,138,0.4), transparent 70%); }

    .content {
      position: relative;
      z-index: 1;
      padding: 40px;
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 8rem;
      font-weight: 900;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 10px;
      animation: float 4s ease-in-out infinite;
    }

    h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 2rem;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 40px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }

    .btn {
      display: inline-block;
      padding: 1rem 2.5rem;
      background-color: var(--accent);
      color: var(--white);
      text-decoration: none;
      font-weight: 700;
      border-radius: 50px;
      transition: all 0.3s ease;
      font-family: 'Outfit', sans-serif;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-size: 0.9rem;
    }

    .btn:hover {
      background-color: #ea580c;
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(249, 115, 22, 0.4);
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
      100% { transform: translateY(0px); }
    }

    @media (max-width: 768px) {
      h1 { font-size: 5rem; }
      h2 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="background-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
  </div>
  
  <div class="content">
    <h1>404</h1>
    <h2>Project Not Found</h2>
    <p>The engineering project or page you are looking for has been moved or doesn't exist. Let's get you back on track.</p>
    <a href="./" class="btn">Return to Portfolio</a>
  </div>
</body>
</html>
